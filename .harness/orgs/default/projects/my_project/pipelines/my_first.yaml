pipeline:
  name: testnew
  identifier: testnew
  projectIdentifier: my_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.githubplaywrightrepo
        repoName: testcode
        build: <+input>
  stages:
    - stage:
        name: Run Playwright Tests
        identifier: run_playwright_tests
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_dependencies
                  spec:
                    shell: Sh
                    command: |
                      npm ci
                      npx playwright install --with-deps chromium
              - step:
                  type: Run
                  name: Run Playwright Tests
                  identifier: run_playwright_tests
                  spec:
                    shell: Sh
                    command: |
                      npx playwright test --headed=false
                    envVariables:
                      ENV: QA
              - step:
                  type: Run
                  name: Upload Test Report
                  identifier: upload_test_report
                  spec:
                    shell: Sh
                    command: |
                      cd AutomationFramework_QA
                      echo "Test report available at playwright-report/"
                  when:
                    stageStatus: All
          serviceDependencies: []
          caching:
            enabled: true
            paths:
              - AutomationFramework_QA/node_modules
