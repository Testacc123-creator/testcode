pipeline:
  name: testnew
  identifier: testnew
  projectIdentifier: my_project
  orgIdentifier: default
  stages:
    - stage:
        name: CI_Build
        identifier: CI_Build
        type: CI
        spec:
          codebase:
            connectorRef: new_connector
            repoName: testcode
            build: <+input>
          execution:
            steps:
              - step:
                  name: Print
                  identifier: print
                  type: Run
                  spec:
                    shell: Sh
                    command: |
                      echo "Pipeline working"
                      ls
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              harnessImageConnectorRef: account.harnessImage
